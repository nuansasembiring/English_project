<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Learning - Minimalist</title>
    <!-- Memanggil file CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SECTION 1: LOGIN -->
<div id="login-page" class="container">
    <h2>Welcome Back!</h2>
    <p>Silakan login untuk mulai belajar</p>
    
    <div style="text-align: left; margin-bottom: 15px;">
        <label style="font-size: 0.8rem; font-weight: bold; color: var(--primary);">NAMA USER</label>
        <input type="text" id="username" placeholder="Masukkan nama kamu...">
    </div>

    <div style="text-align: left; margin-bottom: 20px;">
        <label style="font-size: 0.8rem; font-weight: bold; color: var(--primary);">PASSWORD</label>
        <input type="password" id="password" placeholder="Masukkan password...">
    </div>

    <button onclick="goToMenu()">Masuk Sekarang</button>
    <p style="font-size: 0.7rem; color: #999; margin-top: 15px;">Hint: Passwordnya adalah <b>tugas123</b></p>
</div>


    <!-- SECTION 2: MENU -->
<div id="menu-page" class="container hidden" style="max-width: 600px;">
    <h2 id="welcome-msg">Selamat Datang!</h2>
    <p>Pilih Mode Pembelajaran:</p>
    
    <div class="card-container">
        <!-- Kartu 1: Quiz -->
        <div class="mode-card" onclick="startApp('Quiz')">
            <div class="card-icon">📝</div>
            <h3>Mulai Quiz</h3>
            <p>Uji kemampuan Present Tense kamu di sini.</p>
        </div>

        <!-- Kartu 2: Games -->
        <div class="mode-card" onclick="startApp('Games')">
            <div class="card-icon">🎮</div>
            <h3>Main Games</h3>
            <p>Tebak kategori kata yang seru dan santai.</p>
        </div>
    </div>
</div>

    <!-- SECTION 3: GAMEPLAY -->
    <div id="game-page" class="container hidden">
        <div class="stats">
            <span class="hp">❤️ Nyawa: <span id="hp-val">5</span></span>
            <span class="exp">✨ EXP: <span id="exp-val">0</span></span>
        </div>
        
        <h3 id="question-text">Question here?</h3>
        
        <div id="options-container"></div>

        <div id="feedback-area" class="hidden">
            <div class="explanation" id="explanation-text"></div>
            <button onclick="nextQuestion()" style="margin-top: 10px;">Lanjut</button>
        </div>
    </div>

    <!-- SECTION 4: GAME OVER -->
    <div id="result-page" class="container hidden">
        <h2>Selesai!</h2>
        <p id="final-stats"></p>
        <button onclick="location.reload()">Main Lagi</button>
    </div>

    <!-- Memanggil file JavaScript -->
    <script src="script.js"></script>
</body>
</html>
